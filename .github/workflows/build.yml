name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set package version
        id: package_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            "PACKAGE_VERSION=$($env:GITHUB_REF_NAME)" | Out-File -FilePath $env:GITHUB_ENV -Append
            "version=$($env:GITHUB_REF_NAME)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "PACKAGE_VERSION=dev" | Out-File -FilePath $env:GITHUB_ENV -Append
            "version=dev" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Restore
        run: >
          dotnet restore src/CodexUsageToolbar/CodexUsageToolbar.csproj
          --runtime win-x64
          --configfile NuGet.CI.config

      - name: Build
        run: >
          dotnet build src/CodexUsageToolbar/CodexUsageToolbar.csproj
          --configuration Release
          --runtime win-x64
          --no-restore

      - name: Publish win-x64
        run: >
          dotnet publish src/CodexUsageToolbar/CodexUsageToolbar.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --no-restore
          --output artifacts/publish/win-x64
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false

      - name: Smoke test
        shell: pwsh
        run: .\artifacts\publish\win-x64\CodexUsageToolbar.exe --help

      - name: Add docs
        shell: pwsh
        run: |
          Copy-Item README.md artifacts/publish/win-x64/ -ErrorAction SilentlyContinue
          Copy-Item CHANGELOG.md artifacts/publish/win-x64/ -ErrorAction SilentlyContinue
          Copy-Item scripts artifacts/publish/win-x64/scripts -Recurse -ErrorAction SilentlyContinue
          Copy-Item settings.example.json artifacts/publish/win-x64/ -ErrorAction SilentlyContinue
          Copy-Item settings.example.json artifacts/publish/win-x64/settings.json -ErrorAction SilentlyContinue

      - name: Pack zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/dist | Out-Null
          Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath "artifacts/dist/CodexUsageToolbar-$env:PACKAGE_VERSION-win-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexUsageToolbar-${{ steps.package_version.outputs.version }}-win-x64
          path: artifacts/dist/CodexUsageToolbar-${{ steps.package_version.outputs.version }}-win-x64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: artifacts/dist/CodexUsageToolbar-${{ steps.package_version.outputs.version }}-win-x64.zip
