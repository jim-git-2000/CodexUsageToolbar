name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore CodexUsageToolbar.sln

      - name: Build
        run: dotnet build CodexUsageToolbar.sln --configuration Release --no-restore

      - name: Publish win-x64
        run: >
          dotnet publish src/CodexUsageToolbar/CodexUsageToolbar.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts/publish/win-x64
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false

      - name: Smoke test
        shell: pwsh
        run: .\artifacts\publish\win-x64\CodexUsageToolbar.exe --help

      - name: Add docs
        shell: pwsh
        run: |
          Copy-Item PLAN.md artifacts/publish/win-x64/ -ErrorAction SilentlyContinue
          Copy-Item docs/P1_STATUS.md artifacts/publish/win-x64/ -ErrorAction SilentlyContinue

      - name: Pack zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/dist | Out-Null
          Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath artifacts/dist/CodexUsageToolbar-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexUsageToolbar-win-x64
          path: artifacts/dist/CodexUsageToolbar-win-x64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/dist/CodexUsageToolbar-win-x64.zip
